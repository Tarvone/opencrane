name: Validate and publish affected deployables

on:
  push:
    branches:
      - main
      - feat/agent-platform-v2
  pull_request:
    branches:
      - main
      - "feat/agent-platform-v2*"

permissions:
  actions: read
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Calculate affected work
    runs-on: ubuntu-latest
    outputs:
      nx_base: ${{ steps.affected.outputs.nx_base }}
      nx_head: ${{ steps.affected.outputs.nx_head }}
      deployables: ${{ steps.affected.outputs.deployables }}
      has_deployables: ${{ steps.affected.outputs.has_deployables }}
      api_contract_changed: ${{ steps.affected.outputs.api_contract_changed }}
      e2e_required: ${{ steps.affected.outputs.e2e_required }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Select the last successful base
        uses: nrwl/nx-set-shas@v5
        with:
          main-branch-name: ${{ github.base_ref || (github.ref_name == 'feat/agent-platform-v2' && 'feat/agent-platform-v2' || 'main') }}

      - name: Emit affected deployable matrix
        id: affected
        run: node scripts/affected-deployables.mjs

  test:
    name: Build, test, and lint affected projects
    runs-on: ubuntu-latest
    needs: prepare
    env:
      NX_BASE: ${{ needs.prepare.outputs.nx_base }}
      NX_HEAD: ${{ needs.prepare.outputs.nx_head }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate the database client
        run: npm run db:generate -w @opencrane/server

      - name: Install Helm for topology render validation
        uses: azure/setup-helm@v5

      - name: Enforce Phase A retired-reference and frozen-blue guards
        run: ./scripts/phase-a-forbidden-references.sh

      - name: Enforce Phase B workload ownership and thin app roots
        run: npm run check:phase-b-topology

      - name: Prove Phase B topology guard rejects drift
        run: npm run test:phase-b-topology

      - name: Enforce source-derived clean-green R0 data disposition
        run: npm run check:r0-data-disposition

      - name: Prove the R0 data-disposition guard fails closed
        run: npm run test:r0-data-disposition

      - name: Prove the private R0 evidence collector fails closed
        run: npm run test:r0-estate-evidence

      - name: Enforce Phase A runtime contracts
        run: |
          ./libs/k8s-platform/tests/tenant-entrypoint-contract-policy.sh
          ./libs/k8s-platform/tests/tenant-image-immutability.sh

      - name: Build, test, and lint affected projects
        run: npx nx affected -t build test lint

      - name: Enforce monorepo dependency boundaries
        run: npm run lint:boundaries

      - name: Verify API reference and generated client when affected
        if: needs.prepare.outputs.api_contract_changed == 'true'
        run: |
          npx nx run opencrane:build
          npm run sync-openapi -w @opencrane/website
          git diff --exit-code -- website/public/openapi.json
          npx nx run contracts:generate
          git diff --exit-code -- libs/contracts/src/generated/api.ts

  e2e-k3d:
    name: k3d standalone-silo e2e smoke test
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: needs.prepare.outputs.e2e_required == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run k3d e2e smoke test
        run: ./libs/k8s-platform/tests/k3d-e2e.sh
        env:
          KEEP_CLUSTER: "0"
          TIMEOUT_SECONDS: "300"

  tenant-image-rollback:
    name: Tenant image cold-start and previous-version rollback
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Build current immutable tenant image
        run: docker build -f apps/feat-openclaw-tenant/deploy/Dockerfile -t opencrane-tenant:current .

      - name: Build previous-version immutable tenant image
        run: >-
          docker build
          --build-arg OPENCLAW_VERSION=2026.6.9
          -f apps/feat-openclaw-tenant/deploy/Dockerfile
          -t opencrane-tenant:previous .

      - name: Exercise cold-empty start and rollback on one state volume
        run: ./libs/k8s-platform/tests/tenant-image-immutability.sh
        env:
          CURRENT_IMAGE: opencrane-tenant:current
          PREVIOUS_IMAGE: opencrane-tenant:previous

  build-and-push:
    name: Build and publish affected images
    runs-on: ubuntu-latest
    needs: [prepare, test, e2e-k3d, tenant-image-rollback]
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.has_deployables == 'true' &&
        needs.test.result == 'success' &&
        needs.tenant-image-rollback.result == 'success' &&
        (needs.e2e-k3d.result == 'success' || needs.e2e-k3d.result == 'skipped')
      }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.deployables) }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish ${{ matrix.project }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
