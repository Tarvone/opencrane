name: Validate and publish affected deployables

on:
  push:
    branches:
      - main
      - feat/agent-platform-v2
  pull_request:
    branches:
      - main
      - "feat/agent-platform-v2*"

# One live run per ref: a new push supersedes the in-flight PR validation of the stale commit.
# Pushes to the integration branches are never cancelled mid-publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Calculate affected work
    runs-on: ubuntu-latest
    outputs:
      nx_base: ${{ steps.affected.outputs.nx_base }}
      nx_head: ${{ steps.affected.outputs.nx_head }}
      deployables: ${{ steps.affected.outputs.deployables }}
      has_deployables: ${{ steps.affected.outputs.has_deployables }}
      api_contract_changed: ${{ steps.affected.outputs.api_contract_changed }}
      e2e_required: ${{ steps.affected.outputs.e2e_required }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Restore node_modules
        id: node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Select the last successful base
        uses: nrwl/nx-set-shas@v5
        with:
          main-branch-name: ${{ github.base_ref || (github.ref_name == 'feat/agent-platform-v2' && 'feat/agent-platform-v2' || 'main') }}

      - name: Emit affected deployable matrix
        id: affected
        run: node scripts/affected-deployables.mjs

  test:
    name: Build, test, and lint affected projects
    runs-on: ubuntu-latest
    needs: prepare
    env:
      NX_BASE: ${{ needs.prepare.outputs.nx_base }}
      NX_HEAD: ${{ needs.prepare.outputs.nx_head }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Restore node_modules
        id: node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate the database client
        run: npm run db:generate -w @opencrane/server

      - name: Install Helm for topology render validation
        uses: azure/setup-helm@v5
        with:
          # Pinned to the version local deploys and the render-parity evidence used —
          # renders must not drift with the runner image or a new Helm release.
          version: v4.1.4

      - name: Enforce Phase A retired-reference and legacy-residue guards
        run: ./scripts/phase-a-forbidden-references.sh

      - name: Prove the Phase A residue guard fails closed
        run: npm run test:phase-a-forbidden-references

      - name: Enforce Phase B workload ownership and thin app roots
        run: npm run check:phase-b-topology

      - name: Prove Phase B topology guard rejects drift
        # Tests the guard, not the repo — re-prove only when the guard or its inputs change.
        if: needs.prepare.outputs.guard_inputs_changed == 'true' || github.event_name == 'push'
        run: npm run test:phase-b-topology

      - name: Enforce Phase A runtime contracts
        run: |
          ./libs/k8s-platform/tests/tenant-entrypoint-contract-policy.sh
          ./libs/k8s-platform/tests/tenant-image-immutability.sh

      - name: Restore the Nx computation cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build, test, and lint affected projects
        run: npx nx affected -t build test lint

      - name: Enforce monorepo dependency boundaries
        run: npm run lint:boundaries

      - name: Verify API reference and generated client when affected
        if: needs.prepare.outputs.api_contract_changed == 'true'
        run: |
          npx nx run opencrane:build
          npm run sync-openapi -w @opencrane/website
          git diff --exit-code -- website/public/openapi.json
          npx nx run contracts:generate
          git diff --exit-code -- libs/contracts/src/generated/api.ts

  e2e-k3d:
    name: k3d standalone-silo e2e smoke test
    runs-on: ubuntu-latest
    needs: [prepare, test]
    # PRs pay for the e2e only when the deployment surface moved; integration-branch pushes
    # always run it, and the nightly workflow re-validates the full battery.
    if: needs.prepare.outputs.e2e_required == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          # Pinned to the version local deploys and the render-parity evidence used —
          # renders must not drift with the runner image or a new Helm release.
          version: v4.1.4

      - name: Run k3d e2e smoke test
        run: ./libs/k8s-platform/tests/k3d-e2e.sh
        env:
          KEEP_CLUSTER: "0"
          TIMEOUT_SECONDS: "300"

  build-and-push:
    name: Build and publish affected images
    runs-on: ubuntu-latest
    needs: [prepare, test, e2e-k3d]
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.has_deployables == 'true' &&
        needs.test.result == 'success' &&
        (needs.e2e-k3d.result == 'success' || needs.e2e-k3d.result == 'skipped')
      }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.deployables) }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish ${{ matrix.project }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
