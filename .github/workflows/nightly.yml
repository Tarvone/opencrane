name: Nightly full validation

# The safety net behind the PR-level affected/e2e gating in docker.yml: once a day, run the
# complete battery (guards + negative tests, full build/test/lint, k3d e2e) on each integration
# branch — but only when the branch actually received commits in the last 24 hours.
#
# GitHub runs scheduled workflows from the default branch, so this activates once it reaches
# main; use workflow_dispatch to run it manually before then.

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  nightly:
    name: Full validation (${{ matrix.branch }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        branch: [main, feat/agent-platform-v2]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0

      - name: Skip when the branch saw no commits in the last 24 hours
        id: fresh
        run: |
          if [ -n "$(git log -1 --since='24 hours ago' --format=%H)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No commits on ${{ matrix.branch }} in the last 24 hours — nothing to validate."
          fi

      - uses: actions/setup-node@v6
        if: steps.fresh.outputs.changed == 'true'
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.fresh.outputs.changed == 'true'
        run: npm ci

      - name: Generate the database client
        if: steps.fresh.outputs.changed == 'true'
        run: npm run db:generate -w @opencrane/server

      - name: Install Helm
        if: steps.fresh.outputs.changed == 'true'
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Run every repository guard and its negative tests
        if: steps.fresh.outputs.changed == 'true'
        # --if-present keeps this branch-agnostic: guard suites differ between main and the
        # program branches, and each branch runs exactly the suites it ships.
        run: |
          ./scripts/phase-a-forbidden-references.sh
          npm run --if-present test:phase-a-forbidden-references
          npm run --if-present check:phase-b-topology
          npm run --if-present test:phase-b-topology
          npm run --if-present lint:boundaries

      - name: Build, test, and lint every project
        if: steps.fresh.outputs.changed == 'true'
        run: npx nx run-many -t build test lint

      - name: Install k3d
        if: steps.fresh.outputs.changed == 'true'
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Run k3d e2e smoke test
        if: steps.fresh.outputs.changed == 'true'
        run: ./libs/k8s-platform/tests/k3d-e2e.sh
        env:
          KEEP_CLUSTER: "0"
          TIMEOUT_SECONDS: "300"
