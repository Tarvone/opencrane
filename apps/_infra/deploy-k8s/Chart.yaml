apiVersion: v2
name: opencrane-silo
description: >-
  OpenCrane SILO install — one per ClusterTenant, into the org's own namespace: the
  opencrane-server (per-silo control plane + in-silo controllers) plus its dedicated
  runtime planes (Cognee, LiteLLM, Obot/MCP gateway, feat-skill-registry, Langfuse), per-silo
  NetworkPolicies, and the identity-routing gateway. Installed with apps/_infra/deploy-k8s/deploy.sh,
  either after the fleet (fleet-managed: set crds.install=false to avoid contending with the
  fleet's own CRD install) or standalone (crds.install defaults true — this chart installs its
  own ClusterTenant/Tenant/AccessPolicy CRDs). Still depends on the cert-manager issuer.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - openclaw
  - multi-tenant
  - ai-gateway
maintainers:
  - name: OpenCrane
dependencies:
  # Shared named-template substrate (labels, fullname, RBAC rule sets, env helpers).
  - name: k8s-platform
    version: 0.1.0
    repository: "file://platform"
  # App-owned workload units export named templates; this umbrella only includes them
  # with the unchanged parent release context.
  - name: opencrane-server
    version: 0.1.0
    repository: "file://../../opencrane/helm"
  - name: opencrane-ui
    version: 0.1.0
    repository: "file://../../opencrane-ui/helm"
  - name: opencrane-database-schema
    version: 0.1.0
    repository: "file://components/database-schema"
  - name: opencrane-cognee
    version: 0.1.0
    repository: "file://../cognee/helm"
  - name: opencrane-litellm
    version: 0.1.0
    repository: "file://../litellm/helm"
  - name: opencrane-obot
    version: 0.1.0
    repository: "file://../obot/helm"
  # apps/_infra/langfuse owns this pinned upstream wrapper. Keep the dependency direct so
  # parent values, release names, and every rendered upstream object remain unchanged.
  # PINNED to an exact version (not a ">=" range): the deploy engine resolves deps from Chart.lock
  # via `helm dep build`, so an open range would let every deploy silently ship whatever langfuse
  # is newest at that moment — an untested version drift. Bump this deliberately + regenerate the lock.
  - name: langfuse
    version: "1.5.37"
    repository: https://langfuse.github.io/langfuse-k8s
    condition: langfuse.inCluster.enabled
