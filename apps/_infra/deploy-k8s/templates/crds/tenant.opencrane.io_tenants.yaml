{{- /*
  Chart self-sufficiency (#151 item 3): the Tenant CRD.

  Namespaced; the silo's TenantOperator watches + reconciles Tenants directly in the silo's
  own namespace (full CRUD via clustertenantManagerRbacRules). Gated the same way as the
  ClusterTenant CRD: set `crds.install=false` when a shared CRD bundle already owns this CRD
  cluster-wide, so this release does not contend for ownership. `helm.sh/resource-policy: keep`
  so `helm uninstall` of one silo never
  deletes a CRD every other silo's Tenant CRs depend on. Body copied verbatim from
  `git show main:apps/fleet-platform/crds/tenant.opencrane.io_tenants.yaml`.
*/ -}}
{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.opencrane.io
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
spec:
  group: opencrane.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames:
      - tn
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [displayName, email]
              properties:
                displayName:
                  type: string
                  minLength: 1
                  description: Human-readable name for the tenant
                email:
                  type: string
                  pattern: '^[^ @]+@[^ @]+$'
                  description: Tenant email address
                subject:
                  type: string
                  description: >-
                    IdP-verified subject (OIDC sub) of the user this workspace belongs to.
                    Bound so per-user grant inheritance can attribute the workspace to its owner.
                team:
                  type: string
                  description: Team the tenant belongs to
                monthlyBudgetUsd:
                  type: number
                  minimum: 0
                  description: Monthly budget cap in USD used for LiteLLM virtual key provisioning.
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                policyRef:
                  type: string
                  description: Name of the AccessPolicy CR to apply
                clusterTenantRef:
                  type: string
                  description: >-
                    Optional name of the parent ClusterTenant (the first-class customer /
                    isolation unit this openclaw belongs to). When set, the operator resolves
                    the parent's bound namespace and compute/quota policy and deploys the openclaw
                    there. When absent, the openclaw attaches to the implicit default cluster
                    tenant bound to the install namespace, so single-install behaviour is unchanged
                    and multi-tenancy stays opt-in.
                suspended:
                  type: boolean
                  default: false
                  description: Suspend the tenant pod without deleting state
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Suspended, Degraded, Error]
                degradedReason:
                  type: string
                  description: >-
                    Why the tenant is Degraded (ModelSetEmpty | ModelFetchFailed — the fail-safe
                    reconcile keeps the last-known-good pod instead of rendering an empty model
                    allowlist). Set only while phase is Degraded. MUST be declared here or the
                    structural schema prunes it from status writes.
                podName:
                  type: string
                ingressHost:
                  type: string
                message:
                  type: string
                effectivePolicyRef:
                  type: string
                policyResolutionSource:
                  type: string
                policyResolutionState:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                  description: >-
                    metadata.generation the operator last drove to Running. The reconcile-skip
                    guard compares this against metadata.generation so an unchanged, already-
                    running Tenant is not re-provisioned on every watch replay. MUST be present
                    in the schema or the API server prunes it from status writes, defeating the
                    guard and re-reconciling on every watch cycle — which, because each reconcile
                    writes status (lastReconciled), self-triggers an endless MODIFIED → reconcile
                    loop.
                observedConfigChecksum:
                  type: string
                  description: >-
                    Checksum of the operator config the tenant was last reconciled under. The
                    reconcile-skip guard re-arms a full reconcile when the OPERATOR's config
                    changes even though metadata.generation did not. Same pruning rule as
                    observedGeneration: MUST be declared here or the API server silently drops
                    it from status writes and the config-change re-reconcile never fires.
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Team
          type: string
          jsonPath: .spec.team
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Host
          type: string
          jsonPath: .status.ingressHost
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
