# OpenCrane — single-tenant install preset.
#
# apps/_infra/deploy-k8s alone: this control plane owns
# ClusterTenant lifecycle, per-org namespace creation, per-org domain provisioning
# (OrgDomainProvisioner), and OIDC login (its own clustertenantManager.oidc.*, not a
# fleet-provisioned per-org client) — see docs/agents/apps/opencrane.md's
# "Deployment topology" section for the full walkthrough and prerequisites (ingress-nginx,
# cert-manager, and a Postgres this release can reach must already exist in the cluster;
# this chart does not install them).
#
# Usage:
#   helm dep build apps/_infra/deploy-k8s
#   helm install my-silo apps/_infra/deploy-k8s \
#     -f apps/_infra/deploy-k8s/values/standalone.yaml \
#     --set ingress.domain=example.com \
#     --set clustertenantManager.standaloneSeed.ownerEmail=owner@example.com \
#     --set clustertenantManager.database.existingSecret=my-db-secret
#
# Every value below is restated explicitly for clarity even where it matches the chart's own
# default (crds.install, certManager.selfManagedIssuer) — this file is meant to be read as the
# complete local-install contract, not a diff against values.yaml.

clustertenantManager:
  # -- This control plane creates its own per-ClusterTenant namespace — the app-owned
  #    OpenCrane Helm unit renders the gated namespace-management ClusterRole.
  manageTenantNamespaces: true
  # -- This silo owns its own per-org DNSEndpoint/vanity Certificate (#151 item 2) — left
  #    explicit here for clarity.
  manageOwnDomain: true
  # -- ClusterTenant self-seed: the operator creates + binds its own ClusterTenant CR on boot
  #    from these fields. `ownerEmail` is REQUIRED — pass it via --set (never commit a real owner email
  #    into a values file) before installing.
  standaloneSeed:
    name: default
    displayName: "Default Organisation"
    ownerEmail: ""   # REQUIRED — set via --set clustertenantManager.standaloneSeed.ownerEmail=...
    ownerSubject: "" # Optional — defaults to ownerEmail when omitted.
    tier: shared

# -- Chart self-sufficiency (#151 items 2/3): this is the ONLY OpenCrane release in the
#    cluster, so it must own its own CRDs and cert-manager Issuer. Both already default to
#    true/true — restated here for clarity, not a behaviour change.
crds:
  install: true
certManager:
  enabled: true
  selfManagedIssuer: true
  # -- selfSigned is fine for a first boot / local cluster; switch to "acme" + set
  #    certManager.acme.email (and certManager.acme.dns01.* for a wildcard-free apex) for a
  #    publicly trusted cert before exposing this to real users.
  mode: selfSigned

# -- Not a multi-tenant / multi-instance box: exactly one org, one namespace, one release.
multiCt:
  enabled: false
multiInstance:
  enabled: false
billing:
  enabled: false
