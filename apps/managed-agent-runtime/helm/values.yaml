# Managed (central) agent runtime plane — deployment-only values.
managedAgentRuntime:
  # Dedicated namespace that holds ONLY managed-agent runtime workloads and their identity.
  namespace: opencrane-managed-runtime
  # Server (control-plane) namespace the runtime reaches for its stream + reachable services.
  serverNamespace: opencrane
  # Connector-scoped ServiceAccount. MUST match the bounded managed-agent-runtime-* identity class
  # (___IsManagedAgentRuntimeServiceAccountName) and NEVER the personal agent-runtime-* class.
  serviceAccountName: managed-agent-runtime-default
  # In-cluster egress destinations the managed runtime is allowed to reach. Runtime Pod selection is
  # namespace-local; destination services may live in the server namespace or their own app namespace.
  egress:
    runtimePodComponent: agent-runtime
    channelProxyComponent: channel-proxy
    artifactNamespace: opencrane-artifacts
    artifactServiceComponent: artifact-service
    memoryGatewayComponent: opencrane-server
    litellmComponent: litellm
    obotComponent: obot
    # Port the managed runtime uses to reach the control-plane internal stream + in-cluster services.
    serverInternalPort: 8081
    litellmPort: 4000
    obotPort: 8080
