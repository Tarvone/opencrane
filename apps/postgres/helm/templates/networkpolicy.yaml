{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "opencrane.postgres.fullname" . }}-ingress
  labels:
    {{- include "opencrane.postgres.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: {{ include "opencrane.postgres.fullname" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.clientPodSelectors }}
        - podSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "opencrane.postgres.fullname" . }}
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.operatorNamespace | quote }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.operatorPodLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
{{- end }}
