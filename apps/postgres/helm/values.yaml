instances: 1
image: ghcr.io/cloudnative-pg/postgresql:17.5

database:
  name: opencrane
  owner: opencrane

credentials:
  # Required. The Secret must be type kubernetes.io/basic-auth with username/password keys.
  # Its decoded username must equal database.owner; deploy entrypoints enforce this
  # before installing the Cluster.
  existingSecret: ""

storage:
  size: 20Gi
  storageClass: ""
  resizeInUseVolumes: true

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 2Gi

networkPolicy:
  enabled: true
  # CloudNativePG's operator must reach the instance-manager status endpoint on port 8000.
  operatorNamespace: cnpg-system
  operatorPodLabels:
    app.kubernetes.io/name: cloudnative-pg
  # Only the canonical server and its migration hook connect to this database.
  clientPodSelectors:
    - matchLabels:
        app.kubernetes.io/component: opencrane-server
    - matchLabels:
        app.kubernetes.io/component: opencrane-server-migrate

backup:
  enabled: false
  schedule: "0 0 2 * * *"
  immediate: false
  plugin:
    name: ""
    parameters: {}

restore:
  enabled: false
  sourceName: source
  targetTime: ""
  plugin:
    name: ""
    parameters: {}
