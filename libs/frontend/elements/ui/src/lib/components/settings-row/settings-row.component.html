<section
	class="wo-row"
	[class.wo-row--invalid]="invalid()"
	role="group"
	[attr.aria-labelledby]="labelId"
	[attr.aria-describedby]="describedBy()"
	[attr.aria-invalid]="invalid()"
>
	<div class="wo-row__left">
		@if (controlId(); as targetId) {
			<label class="wo-row__label" [id]="labelId" [for]="targetId">{{ label() }}</label>
		} @else {
			<p class="wo-row__label" [id]="labelId">{{ label() }}</p>
		}
		@if (description(); as descriptionValue) {
			<p class="wo-row__description" [id]="descriptionId">{{ descriptionValue }}</p>
		}
	</div>
	<div class="wo-row__control">
		<ng-content select="[woSettingsControl]" />
		<div class="wo-row__help" [id]="helpId"><ng-content select="[woSettingsHelp]" /></div>
		<div class="wo-row__error" [id]="errorId" role="alert"><ng-content select="[woSettingsError]" /></div>
	</div>
</section>
