<wo-section-heading title="Account" subtitle="Your personal profile and workspace preferences." />

<wo-settings-row label="Profile picture">
	<div woSettingsControl class="wo-account__avatar-row">
		<wo-avatar-circle [initials]="avatarInitials()" [accessibleName]="formState().draft.fullName || 'Current user'" color="var(--oc-teal)" size="profile" />
		<button type="button" class="wo-account__change-photo">Change photo</button>
	</div>
</wo-settings-row>

<wo-settings-row label="Full name">
	<input woSettingsControl type="text" class="wo-text-input wo-account__name-input" [value]="formState().draft.fullName" (input)="onFullNameChange($event)" [disabled]="formState().phase === SettingsFormPhase.Pending" />
</wo-settings-row>

<wo-settings-row label="Email" description="Managed by ZITADEL IdP.">
	<div woSettingsControl class="wo-account__readonly">{{ email() }}</div>
</wo-settings-row>

<wo-settings-row label="Role">
	<div woSettingsControl>
		<span class="wo-account__role">{{ role() }}</span>
	</div>
</wo-settings-row>

<wo-settings-row label="Notification preferences">
	<div woSettingsControl class="wo-account__prefs">
		@for (preference of notificationPreferences; track preference) {
			<div class="wo-account__pref">
				<span>{{ preference }}</span>
				<wo-toggle-field [value]="true" [label]="preference" [hideLabel]="true" />
			</div>
		}
	</div>
</wo-settings-row>

<wo-save-button [state]="formState()" (submitIntent)="save()" />
