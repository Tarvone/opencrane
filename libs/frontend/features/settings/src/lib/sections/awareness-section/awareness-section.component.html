<wo-section-heading
	title="Awareness"
	subtitle="How your pod queries Cognee knowledge datasets during the agentic loop."
/>

<wo-settings-row label="Fallback behaviour" description="When Cognee is unreachable mid-loop.">
	<select woSettingsControl class="wo-select wo-aware__fallback"
		[value]="formState().draft.fallbackBehaviour"
		[disabled]="formState().phase === SettingsFormPhase.Pending"
		(change)="onFallbackChange($any($event.target).value)">
		@for (opt of fallbackOptions; track opt.value) {
			<option [value]="opt.value">{{ opt.label }}</option>
		}
	</select>
</wo-settings-row>

<wo-settings-row label="Citation mode" description="Require Cognee citations on grounded responses.">
	<div woSettingsControl class="wo-aware__citation">
		<wo-toggle-field
			[value]="formState().draft.citationMode"
			label="Citation mode"
			[hideLabel]="true"
			(valueChange)="onCitationModeChange($event)" />
		<span class="wo-aware__citation-label">{{ citationModeLabel() }}</span>
	</div>
</wo-settings-row>

<wo-settings-row label="Scope query order" description="Datasets are queried in this order.">
	<p woSettingsControl class="wo-aware__order wo-mono">personal → project → dept → org</p>
</wo-settings-row>

<wo-save-button [state]="formState()" (submitIntent)="save()" />
