<wo-section-heading title="Pod" subtitle="Your isolated OpenCrane instance." />

<wo-settings-row label="Pod ID" description="Read-only. Assigned by operator.">
	<p woSettingsControl class="wo-pod__readonly wo-mono">{{ pod.podId }}</p>
</wo-settings-row>

<wo-settings-row label="Display name">
	<div woSettingsControl class="wo-pod__field">
		<label class="wo-sr-only" for="pod-display-name">Display name</label>
		<input id="pod-display-name" type="text" class="wo-text-input" [value]="formState().draft.displayName" [disabled]="pending()" [attr.aria-invalid]="!!formState().validationErrors['displayName']" [attr.aria-describedby]="formState().validationErrors['displayName'] ? 'pod-display-name-error' : null" (input)="editDisplayName($event)" />
		@if (formState().validationErrors["displayName"]; as error) {
			<p id="pod-display-name-error" class="wo-pod__error" role="alert">{{ error }}</p>
		}
	</div>
</wo-settings-row>

<wo-settings-row label="OpenCrane version" description="Pin to a version or track latest.">
	<div woSettingsControl class="wo-pod__field">
		<div class="wo-pod__version">
			<label class="wo-sr-only" for="pod-version">OpenCrane version</label>
			<input id="pod-version" type="text" class="wo-text-input wo-mono" [value]="formState().draft.version" [disabled]="pending()" [attr.aria-invalid]="!!formState().validationErrors['version']" [attr.aria-describedby]="formState().validationErrors['version'] ? 'pod-version-error pod-latest-version' : 'pod-latest-version'" (input)="editVersion($event)" />
			<span id="pod-latest-version">latest: {{ pod.latestVersion }}</span>
		</div>
		@if (formState().validationErrors["version"]; as error) {
			<p id="pod-version-error" class="wo-pod__error" role="alert">{{ error }}</p>
		}
	</div>
</wo-settings-row>

<wo-settings-row label="Storage" description="Encrypted GCS. Operator cannot read.">
	<div woSettingsControl class="wo-pod__stats">
		@for (stat of pod.storageStats; track stat.label) {
			<div>
				<p class="wo-pod__stat-label">{{ stat.label }}</p>
				<p class="wo-pod__stat-value wo-mono">{{ stat.value }}</p>
			</div>
		}
	</div>
</wo-settings-row>

<wo-settings-row label="Auto-update" description="Apply patch updates automatically.">
	<wo-toggle-field woSettingsControl [value]="formState().draft.autoUpdate" (valueChange)="editAutoUpdate($event)" [label]="formState().draft.autoUpdate ? 'Enabled' : 'Disabled'" [pending]="pending()" />
</wo-settings-row>

<wo-save-button [state]="formState()" (submitIntent)="submit()" (resetIntent)="reset()" (reloadLatestIntent)="reloadLatest()" (returnToEditingIntent)="returnToEditing()" />
