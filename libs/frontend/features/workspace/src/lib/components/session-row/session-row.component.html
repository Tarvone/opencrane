<a
	[routerLink]="['/session', session().id]"
	routerLinkActive="wo-session--active"
	#rla="routerLinkActive"
	class="wo-session"
>
	<span class="wo-session__dot" [style.background]="session().color"></span>
	<span class="wo-session__body">
		<span class="wo-session__name wo-truncate" [class.wo-session__name--active]="rla.isActive">{{ session().name }}</span>
		<span class="wo-session__meta">
			@if (department(); as dept) {
				<span>{{ dept.label }}</span>
			}
		</span>
	</span>
	@if (session().unread) {
		<span class="wo-session__unread wo-mono" [style.background]="session().color">{{ session().unread }}</span>
	}
</a>
