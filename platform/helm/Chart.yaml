apiVersion: v2
name: opencrane
description: Multi-tenant OpenClaw platform on Kubernetes
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - openclaw
  - multi-tenant
  - ai-gateway
maintainers:
  - name: OpenCrane
dependencies:
  # Langfuse LLM observability — deployed in-cluster when langfuse.inCluster.enabled=true.
  # Condition gates the subchart entirely so a default render is byte-identical with it absent.
  - name: langfuse
    version: ">=0.6.0"
    repository: https://langfuse.github.io/langfuse-k8s
    condition: langfuse.inCluster.enabled
