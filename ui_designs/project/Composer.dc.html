<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative">
  <sc-if value="{{ mentionOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;bottom:calc(100% + 8px);left:0;width:260px;background:#fff;border:1px solid #e2ddd4;border-radius:10px;box-shadow:0 8px 22px rgba(0,0,0,.12);padding:5px;animation:ocPop .16s ease both">
      <div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a8a49c;padding:5px 8px 4px">Add to conversation</div>
      <sc-for list="{{ mentionResults }}" as="r" hint-placeholder-count="3">
        <div style="display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;background:{{ r.rowBg }}">
          <div style="width:24px;height:24px;border-radius:{{ r.avRadius }};background:{{ r.bg }};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0">
            <sc-if value="{{ r.isAgent }}" hint-placeholder-val="{{ false }}"><svg width="12" height="10" viewBox="0 0 16 14"><polygon points="6,5 11,13 8,13" fill="#fff" opacity=".9"></polygon><polygon points="6,5 12,1 11,13" fill="#fff"></polygon></svg></sc-if>
            <sc-if value="{{ r.isPlain }}" hint-placeholder-val="{{ true }}">{{ r.initials }}</sc-if>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;color:#1a1918;font-weight:500">{{ r.name }}</div>
            <div style="font-size:11px;color:#9a948b">{{ r.kind }}</div>
          </div>
        </div>
      </sc-for>
    </div>
  </sc-if>

  <div style="display:flex;align-items:flex-end;gap:9px;border:1px solid {{ border }};background:#fff;border-radius:12px;padding:10px;box-shadow:0 1px 0 #ece9e3;transition:border .15s ease">
    <div style="width:30px;height:30px;border-radius:8px;border:1px solid #dcd8d0;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer" style-hover="border-color:#c2beb6">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8a8682" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg>
    </div>
    <div style="flex:1;min-width:0;font-size:14px;line-height:1.5;color:#2a2825;padding:6px 0 4px;min-height:20px">
      <sc-if value="{{ placeholderVisible }}" hint-placeholder-val="{{ true }}"><span style="color:#b0ada8">Write a message…</span><span style="color:#c2beb6">&nbsp;&nbsp;·&nbsp;&nbsp;<span style="font-weight:600;color:#a8a49c">@</span> people or agents&nbsp;&nbsp;·&nbsp;&nbsp;<span style="font-weight:600;color:#a8a49c">/</span> skills</span></sc-if>
      <sc-if value="{{ hasComposerText }}" hint-placeholder-val="{{ false }}"><span>{{ cPre }}</span><sc-if value="{{ hasMention }}" hint-placeholder-val="{{ false }}"><span style="color:#0a7a8c;font-weight:600;background:#e3f6fa;border-radius:4px;padding:0 3px">{{ cMention }}</span></sc-if><span>{{ cPost }}</span></sc-if><span style="opacity:{{ caret }};color:#0db5cc;font-weight:600">|</span>
    </div>
    <div style="width:32px;height:32px;border-radius:8px;background:{{ sendBg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s ease">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="{{ sendStroke }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;680px&quot;,&quot;height&quot;:&quot;120px&quot;},&quot;border&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#d0cdc6&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;placeholderVisible&quot;:{&quot;editor&quot;:null,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;hasComposerText&quot;:{&quot;editor&quot;:null,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;cPre&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cMention&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cPost&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hasMention&quot;:{&quot;editor&quot;:null,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;caret&quot;:{&quot;editor&quot;:null,&quot;default&quot;:1,&quot;tsType&quot;:&quot;number&quot;},&quot;sendBg&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#eae6df&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sendStroke&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#b0ada8&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;mentionOpen&quot;:{&quot;editor&quot;:null,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;mentionResults&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;any[]&quot;}}"></script>
</body>
</html>
