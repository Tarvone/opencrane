<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:192px;height:100%;flex-shrink:0;background:#f1eee7;display:flex;flex-direction:column;border-right:1px solid #e3dfd7">
  <div style="padding:14px 16px 12px;border-bottom:1px solid #e3dfd7">
    <span style="display:inline-flex;align-items:center;gap:7px"><svg width="16" height="14" viewBox="0 0 16 14"><polygon points="1,13 6,5 8,13" fill="#0d8ba0"></polygon><polygon points="6,5 11,13 8,13" fill="#22c7dd"></polygon><polygon points="6,5 12,1 11,13" fill="#0db5cc"></polygon><polygon points="12,1 15,3 13,5" fill="#f47920"></polygon></svg><span style="font-size:14.5px;font-weight:600;color:#1a1918;letter-spacing:-.2px">Open<span style="color:#0994a8">Crane</span></span></span>
  </div>

  <div style="flex:1;overflow-y:auto;padding:8px 6px">
    <div style="padding:7px 10px;margin-bottom:4px;font-size:13px;font-weight:500;color:{{ nsColor }};cursor:pointer;border:1px solid {{ nsBorder }};background:{{ nsBg }};border-radius:7px;box-shadow:0 1px 0 #e3dfd7;display:flex;align-items:center;gap:7px;transition:all .15s ease" style-hover="border-color:#c2beb6;color:#1a1918">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M6 2v8M2 6h8"></path></svg>
      New session
    </div>

    <div style="padding:5px 10px 3px;font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#a8a49c;margin-top:6px">My Sessions</div>
    <sc-for list="{{ myItems }}" as="it" hint-placeholder-count="2">
      <div style="padding:7px 10px;border-radius:6px;background:{{ it.bg }};box-shadow:{{ it.shadow }};cursor:pointer;margin:1px 0;opacity:{{ it.rootOpacity }}">
        <div style="display:flex;align-items:center;gap:7px">
          <sc-if value="{{ it.hasDot }}" hint-placeholder-val="{{ false }}"><div style="width:6px;height:6px;border-radius:50%;background:{{ it.dot }};flex-shrink:0"></div></sc-if>
          <span style="font-size:13px;font-weight:{{ it.nameWeight }};color:{{ it.nameColor }};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ it.label }}</span>
          <sc-if value="{{ it.hasBadge }}" hint-placeholder-val="{{ false }}"><span style="font-size:10px;background:{{ it.badgeBg }};color:{{ it.badgeColor }};padding:1px 5px;border-radius:3px;font-weight:{{ it.badgeWeight }}">{{ it.badge }}</span></sc-if>
        </div>
        <sc-if value="{{ it.hasSub }}" hint-placeholder-val="{{ true }}"><div style="font-size:11px;color:#9a948b;margin-top:1px;padding-left:{{ it.subPad }}">{{ it.sub }}</div></sc-if>
      </div>
    </sc-for>

    <sc-if value="{{ hasShared }}" hint-placeholder-val="{{ false }}">
      <div style="padding:5px 10px 3px;font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#a8a49c;margin-top:8px">Shared</div>
      <sc-for list="{{ sharedItems }}" as="it" hint-placeholder-count="2">
        <div style="padding:7px 10px;border-radius:6px;background:{{ it.bg }};box-shadow:{{ it.shadow }};cursor:pointer;margin:1px 0;opacity:{{ it.rootOpacity }}">
          <div style="display:flex;align-items:center;gap:7px">
            <sc-if value="{{ it.hasDot }}" hint-placeholder-val="{{ false }}"><div style="width:6px;height:6px;border-radius:50%;background:{{ it.dot }};flex-shrink:0"></div></sc-if>
            <span style="font-size:13px;font-weight:{{ it.nameWeight }};color:{{ it.nameColor }};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ it.label }}</span>
            <sc-if value="{{ it.hasBadge }}" hint-placeholder-val="{{ false }}"><span style="font-size:10px;background:{{ it.badgeBg }};color:{{ it.badgeColor }};padding:1px 5px;border-radius:3px;font-weight:{{ it.badgeWeight }}">{{ it.badge }}</span></sc-if>
          </div>
          <sc-if value="{{ it.hasSub }}" hint-placeholder-val="{{ false }}"><div style="font-size:11px;color:#9a948b;margin-top:1px;padding-left:{{ it.subPad }}">{{ it.sub }}</div></sc-if>
        </div>
      </sc-for>
    </sc-if>
  </div>

  <div style="border-top:1px solid #e3dfd7">
    <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;color:#6a6663;cursor:pointer" style-hover="color:#0a94a7">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      <span style="font-size:13px">Settings</span>
    </div>
    <div style="padding:10px 12px;display:flex;align-items:center;gap:8px;border-top:1px solid #e3dfd7">
      <div style="width:28px;height:28px;border-radius:50%;background:{{ userBg }};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">{{ userInitials }}</div>
      <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;color:#4a4845;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ userName }}</div></div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;192px&quot;,&quot;height&quot;:&quot;560px&quot;},&quot;nsBg&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#fff&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;nsBorder&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#dcd8d0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;nsColor&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#4a4845&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;myItems&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;any[]&quot;},&quot;sharedItems&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;any[]&quot;},&quot;hasShared&quot;:{&quot;editor&quot;:null,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;userInitials&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;MA&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userName&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;Maya Achieng&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userBg&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#0db5cc&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
